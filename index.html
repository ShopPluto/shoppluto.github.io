<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ==========================================================
                        META INFORMATION
    =========================================================== -->

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Pluto | Premium Marketplace</title>

    <!-- ==========================================================
                        FONT AWESOME
    =========================================================== -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- ==========================================================
                        GLOBAL CSS
    =========================================================== -->

    <link rel="stylesheet"
          href="assets/css/main.css">

    <!-- ==========================================================
                        COMPONENT CSS
    =========================================================== -->

    <link rel="stylesheet"
          href="components/announcement/announcement.css">

    <link rel="stylesheet"
          href="components/navbar/navbar.css">

</head>

<body>

    <!-- ==========================================================
                        ANNOUNCEMENT BAR
    =========================================================== -->

    <div class="announcement-bar">

        <div class="container">

            <div class="announcement-content">

                <div class="announcement-item">

                    <i class="fa-solid fa-truck-fast"></i>

                    <span>

                        Free Shipping on Orders Above ₹499

                    </span>

                </div>

                <div class="announcement-item">

                    <i class="fa-solid fa-bolt"></i>

                    <span>

                        Flash Sale Ends Tonight

                    </span>

                </div>

                <div class="announcement-item">

                    <i class="fa-solid fa-gift"></i>

                    <span>

                        Extra 10% Off For New Users

                    </span>

                </div>

            </div>

        </div>

    </div>

    <!-- ==========================================================
                        PREMIUM NAVBAR
    =========================================================== -->

    <header class="navbar">

        <div class="container">

            <div class="navbar-top">

                <!-- ==========================
                            LOGO
                =========================== -->

                <div class="navbar-logo">

                    <a href="index.html">

                        <img src="assets/images/logo/pluto-logo.png"
                             alt="Pluto Logo">

                    </a>

                </div>

                <!-- ==========================
                        DELIVERY LOCATION
                =========================== -->

                <div class="delivery-box">

                    <div class="delivery-icon">

                        <i class="fa-solid fa-location-dot"></i>

                    </div>

                    <div class="delivery-content">

                        <span class="delivery-title">

                            Deliver To

                        </span>

                        <span class="delivery-address">

                            Jaipur, Rajasthan

                        </span>

                    </div>

                </div>

                <!-- ==========================
                            SEARCH
                =========================== -->

                <div class="search-wrapper">

                    <div class="search-category">

                        <span>

                            All Categories

                        </span>

                        <i class="fa-solid fa-chevron-down"></i>

                    </div>

                    <div class="search-input">

                        <input
                            type="text"
                            placeholder="Search for products, brands and more">

                    </div>

                    <button class="search-button">

                        <i class="fa-solid fa-magnifying-glass"></i>

                    </button>

                </div>

                <!-- ==========================
                        NAVIGATION ACTIONS
                =========================== -->

                <div class="navbar-actions">

                    <!-- Wishlist -->

                    <a href="#"
                       class="action-item">

                        <div class="action-icon">

                            <i class="fa-regular fa-heart"></i>

                        </div>

                        <div class="action-text">

                            Wishlist

                        </div>

                    </a>

                    <!-- Account -->

                    <a href="#"
                       class="action-item">

                        <div class="action-icon">

                            <i class="fa-regular fa-user"></i>

                        </div>

                        <div class="action-text">

                            Account

                        </div>

                    </a>

                    <!-- Orders -->

                    <a href="#"
                       class="action-item">

                        <div class="action-icon">

                            <i class="fa-solid fa-box"></i>

                        </div>

                        <div class="action-text">

                            Orders

                        </div>

                    </a>

                    <!-- Cart -->

                    <a href="#"
                       class="action-item cart-item">

                        <div class="action-icon">

                            <i class="fa-solid fa-cart-shopping"></i>

                            <span class="cart-count">

                                0

                            </span>

                        </div>

                        <div class="action-text">

                            Cart

                        </div>

                    </a>

                </div>

            </div>

        </div>

    </header>

    <!-- ==========================================================
                        HERO SECTION
                (Next Component)
    =========================================================== -->



    <!-- ==========================================================
                        CATEGORIES
    =========================================================== -->



    <!-- ==========================================================
                        FLASH SALE
    =========================================================== -->



    <!-- ==========================================================
                        TRENDING PRODUCTS
    =========================================================== -->



    <!-- ==========================================================
                        FOOTER
    =========================================================== -->



    <!-- ==========================================================
                        JAVASCRIPT
    =========================================================== -->

    <script src="components/navbar/navbar.js"></script>

</body>

</html>
