<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pluto Navbar Component</title>

    <link rel="stylesheet" href="navbar.css">
</head>

<body>

    <!-- ========================================= -->
    <!-- Pluto Navigation -->
    <!-- ========================================= -->

    <header class="navbar">

        <!-- Top Navigation -->

        <div class="navbar-top">

            <!-- Logo -->

            <div class="logo">

                <a href="#">
                    Pluto
                </a>

            </div>

            <!-- Delivery -->

            <div class="delivery">

                <span class="delivery-label">
                    Deliver to
                </span>

                <strong>
                    Jaipur
                </strong>

            </div>

            <!-- Search -->

            <div class="search-container">

                <input
                    type="text"
                    placeholder="Search for products, brands and more...">

                <button class="search-btn">

                    Search

                </button>

            </div>

            <!-- User -->

            <div class="user-actions">

                <a href="#">Account</a>

                <a href="#">Wishlist</a>

                <a href="#">Cart</a>

            </div>

        </div>

        <!-- Bottom Navigation -->

        <nav class="navbar-menu">

            <ul>

                <li><a href="#">All</a></li>

                <li><a href="#">Electronics</a></li>

                <li><a href="#">Fashion</a></li>

                <li><a href="#">Home</a></li>

                <li><a href="#">Beauty</a></li>

                <li><a href="#">Books</a></li>

                <li><a href="#">More</a></li>

            </ul>

        </nav>

    </header>

</body>

</html>
